<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNAPS Financial Services</title>
    <style>
        .logo-container {
            display: inline-flex;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
            gap: 20px;
            padding: 10px;
            user-select: none;
        }

        .logo-graphic {
            height: auto;
            max-height: 120px; /* Adjusts the graphic height to fit beautifully */
            display: block;
        }

        .logo-text-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-brand-name {
            font-size: 72px;
            font-weight: bold;
            color: #FF0000; /* Vibrant Red */
            line-height: 0.9;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .logo-divider {
            border: none;
            border-top: 3px solid #0000FF; /* Solid Blue Line */
            margin: 4px 0;
            width: 100%;
        }

        .logo-tagline {
            font-size: 26px;
            font-weight: normal;
            color: #0000FF; /* Vibrant Blue */
            line-height: 1;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Reference to the provided image asset -->
            <img class="logo-graphic" src="logo - Copy.png" alt="KNAPS Icon Step Dynamic">
            
            <div class="logo-text-wrapper">
                <h1 class="logo-brand-name">KNAPS</h1>
                <hr class="logo-divider">
                <p class="logo-tagline">Financial Services</p>
            </div>
        </div>
    </header>

</body>
</html>
