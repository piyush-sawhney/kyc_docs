server:
  port: 3000

spring:
  application:
    name: kyc-docs
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kyc_docs}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-256-bit-key}
    expiration: 86400000
    issuer: kyc-docs
  totp:
    issuer: KYC-Docs
  encryption:
    key: ${ENCRYPTION_KEY:change-me-in-production-use-a-256-bit-key}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  rate-limiting:
    requests-per-minute: 100

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.kycdocs: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
